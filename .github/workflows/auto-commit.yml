name: Auto Commit Bot (Hourly)

on:
  schedule:
    - cron: "* * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update TODO file
        run: |
          echo "Last update: $(date)" > TODO.md

      - name: Commit changes
        run: |
          git config --global user.name "ShivKumar033"
          git config --global user.email "ShivKumar033@users.noreply.github.com"

          git add TODO.md
          git commit -m "🤖 Hourly auto commit" || echo "No changes"

      - name: Push changes
        run: |
          git push